<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SócratIA · Panel del docente</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel2: #273449;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #34d399;
      --bad: #f87171;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    header h1 { margin: 0; font-size: 22px; }
    header span { color: var(--muted); font-size: 14px; }
    main { padding: 24px 32px; max-width: 1100px; margin: 0 auto; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
    .card .value { font-size: 30px; font-weight: 700; }
    .card .label { color: var(--muted); font-size: 13px; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 12px; overflow: hidden; }
    th, td { padding: 12px 16px; text-align: left; font-size: 14px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    tbody tr { cursor: pointer; transition: background 0.15s; }
    tbody tr:hover { background: var(--panel2); }
    .bar { height: 8px; border-radius: 4px; background: var(--border); position: relative; width: 120px; }
    .bar > span { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 4px; background: var(--accent); }
    .muted { color: var(--muted); }
    .detail { margin-top: 28px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 22px; display: none; }
    .detail.open { display: block; }
    .detail h2 { margin: 0 0 4px; font-size: 18px; }
    .detail h3 { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; margin: 22px 0 10px; }
    .skill-row { display: flex; align-items: center; gap: 14px; padding: 6px 0; }
    .skill-row .name { width: 200px; }
    .skill-row .pct { width: 48px; text-align: right; font-variant-numeric: tabular-nums; }
    .attempt { display: flex; gap: 12px; align-items: center; padding: 6px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
    .dot.ok { background: var(--ok); }
    .dot.bad { background: var(--bad); }
    .close { float: right; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 12px; cursor: pointer; }
    .empty { color: var(--muted); padding: 40px; text-align: center; }
    .btn-ai { background: linear-gradient(135deg, #6d28d9, #4c1d95); color: #fff; border: none; border-radius: 10px; padding: 10px 18px; font-weight: 600; cursor: pointer; font-size: 14px; box-shadow: 0 4px 14px rgba(109,40,217,0.3); }
    .btn-ai:hover { box-shadow: 0 6px 20px rgba(109,40,217,0.45); }
    .btn-ai:disabled { opacity: 0.6; cursor: progress; }
    .toolbar { display: flex; justify-content: flex-end; margin-bottom: 16px; }
    .ai-box { margin-top: 16px; background: #faf8ff; border: 1px solid #e6def9; border-radius: 12px; padding: 18px 22px; line-height: 1.6; }
    .ai-box h1, .ai-box h2, .ai-box h3 { color: #4c1d95; margin: 10px 0 6px; font-size: 15px; }
    .ai-box ul { margin: 6px 0; padding-left: 20px; }
    .ai-box strong { color: #1f1b2e; }
    .ai-tag { display: inline-block; font-size: 11px; font-weight: 700; color: #6d28d9; background: #ede9fe; border-radius: 6px; padding: 2px 8px; margin-bottom: 8px; letter-spacing: 0.03em; }
    .gen-form { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 12px; }
    .gen-form input, .gen-form select { border: 1px solid #e0dcec; border-radius: 8px; padding: 9px 11px; font-size: 14px; font-family: inherit; }
    .gen-form input#genTopic { flex: 1; min-width: 200px; }
    .gen-form input#genCount { width: 70px; }
    .gen-problem { background: #fff; border: 1px solid #e6def9; border-radius: 10px; padding: 14px 16px; margin-top: 10px; }
    .gen-problem .q { font-weight: 600; color: #1f1b2e; margin: 6px 0; }
    .gen-problem .skill { font-size: 12px; color: #6d28d9; }
    .gen-choice { padding: 4px 10px; margin: 3px 0; border-radius: 6px; font-size: 14px; }
    .gen-choice.correct { background: #ecfdf5; color: #065f46; font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <h1>SócratIA</h1>
    <span>Panel del docente · progreso de los alumnos</span>
  </header>
  <main>
    <div class="cards" id="cards"></div>
    <div class="toolbar">
      <button class="btn-ai" id="genBtn">Generar ejercicios con IA</button>
      <button class="btn-ai" id="reportBtn">Generar reporte del grupo con IA</button>
    </div>
    <div class="ai-box" id="genBox" style="display:none">
      <span class="ai-tag">SÓCRATIA · GENERADOR</span>
      <div class="gen-form">
        <input id="genTopic" placeholder="Tema (ej. ecuaciones lineales)" />
        <input id="genLevel" placeholder="Nivel (ej. secundaria)" value="secundaria" />
        <input id="genCount" type="number" min="1" max="6" value="3" title="Cantidad" />
        <select id="genLang">
          <option value="es">Español</option>
          <option value="en">English</option>
          <option value="pt">Português</option>
          <option value="quechua">Runa Simi (Quechua)</option>
        </select>
        <button class="btn-ai" id="genRun">Generar</button>
      </div>
      <div id="genResult"></div>
    </div>
    <div class="ai-box" id="reportBox" style="display:none"></div>
    <table>
      <thead>
        <tr>
          <th>Alumno</th>
          <th>Intentos</th>
          <th>Aciertos</th>
          <th>% Acierto</th>
          <th>Dominio promedio</th>
          <th>Última actividad</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="detail" id="detail"></div>
  </main>

  <script type="module">
    const API = "/ai";

    function renderMarkdown(md) {
      const lines = md.split("\n");
      let html = "";
      let inList = false;
      for (let line of lines) {
        line = line.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        const bullet = line.match(/^\s*[-*]\s+(.*)/);
        if (bullet) {
          if (!inList) { html += "<ul>"; inList = true; }
          html += `<li>${bullet[1]}</li>`;
          continue;
        }
        if (inList) { html += "</ul>"; inList = false; }
        const h = line.match(/^(#{1,3})\s+(.*)/);
        if (h) { const n = h[1].length; html += `<h${n}>${h[2]}</h${n}>`; }
        else if (line.trim() === "") { html += ""; }
        else { html += `<p style="margin:6px 0">${line}</p>`; }
      }
      if (inList) html += "</ul>";
      return html;
    }

    function pct(part, total) {
      if (!total) return 0;
      return Math.round((part / total) * 100);
    }

    function masteryColor(value) {
      if (value >= 0.7) return "var(--ok)";
      if (value < 0.4) return "var(--bad)";
      return "var(--accent)";
    }

    function bar(value) {
      const width = Math.round((value ?? 0) * 100);
      const color = masteryColor(value ?? 0);
      return `<div class="bar"><span style="width:${width}%;background:${color}"></span></div>`;
    }

    function fmtDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleString("es-PE", { dateStyle: "short", timeStyle: "short" });
    }

    function renderCards(students) {
      const total = students.length;
      const attempts = students.reduce((a, s) => a + s.attemptsTotal, 0);
      const correct = students.reduce((a, s) => a + s.correctTotal, 0);
      document.getElementById("cards").innerHTML = `
        <div class="card"><div class="value">${total}</div><div class="label">Alumnos</div></div>
        <div class="card"><div class="value">${attempts}</div><div class="label">Intentos totales</div></div>
        <div class="card"><div class="value">${pct(correct, attempts)}%</div><div class="label">Acierto global</div></div>`;
    }

    function renderRows(students) {
      const tbody = document.getElementById("rows");
      if (students.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty">Aún no hay actividad de alumnos.</td></tr>`;
        return;
      }
      tbody.innerHTML = students.map((s) => `
        <tr data-id="${encodeURIComponent(s.externalId)}">
          <td>${s.externalId}</td>
          <td>${s.attemptsTotal}</td>
          <td>${s.correctTotal}</td>
          <td>${pct(s.correctTotal, s.attemptsTotal)}%</td>
          <td>${bar(s.avgMastery)}</td>
          <td class="muted">${fmtDate(s.lastActivity)}</td>
        </tr>`).join("");
      for (const tr of tbody.querySelectorAll("tr[data-id]")) {
        tr.addEventListener("click", () => openDetail(tr.getAttribute("data-id")));
      }
    }

    async function openDetail(id) {
      const res = await fetch(`${API}/progress/${id}`);
      const data = await res.json();
      const detail = document.getElementById("detail");
      const skills = data.mastery.map((m) => `
        <div class="skill-row">
          <div class="name">${m.skill}</div>
          ${bar(m.mastery)}
          <div class="pct">${Math.round(m.mastery * 100)}%</div>
          <div class="muted">${m.attempts} intento(s)</div>
        </div>`).join("") || `<div class="muted">Sin habilidades registradas.</div>`;
      const recent = data.recent.map((a) => `
        <div class="attempt">
          <span class="dot ${a.correct ? "ok" : "bad"}"></span>
          <span>${a.skill ?? "—"}</span>
          <span class="muted">${a.problemId ?? ""}</span>
          <span class="muted" style="margin-left:auto">${fmtDate(a.createdAt)}</span>
        </div>`).join("") || `<div class="muted">Sin intentos.</div>`;
      detail.innerHTML = `
        <button class="close" id="closeDetail">Cerrar</button>
        <h2>${decodeURIComponent(id)}</h2>
        <div class="muted">${data.attemptsTotal} intentos · ${data.correctTotal} aciertos · ${pct(data.correctTotal, data.attemptsTotal)}% de acierto</div>
        <h3>Dominio por habilidad</h3>
        ${skills}
        <h3>Actividad reciente</h3>
        ${recent}
        <h3>Diagnóstico con IA</h3>
        <button class="btn-ai" id="diagnoseBtn">Generar diagnóstico de este alumno</button>
        <div class="ai-box" id="diagnoseBox" style="display:none"></div>`;
      detail.classList.add("open");
      document.getElementById("closeDetail").addEventListener("click", () => detail.classList.remove("open"));
      document.getElementById("diagnoseBtn").addEventListener("click", async (e) => {
        const btn = e.target;
        const box = document.getElementById("diagnoseBox");
        btn.disabled = true;
        btn.textContent = "Analizando…";
        box.style.display = "block";
        box.innerHTML = '<span class="ai-tag">SÓCRATIA · IA</span><div class="muted">Generando diagnóstico…</div>';
        try {
          const r = await fetch(`${API}/diagnose/${encodeURIComponent(id)}`);
          const d = await r.json();
          box.innerHTML = '<span class="ai-tag">SÓCRATIA · IA</span>' + renderMarkdown(d.diagnosis || "Sin datos suficientes.");
        } catch (err) {
          box.innerHTML = `<div class="muted">Error: ${err.message}</div>`;
        }
        btn.textContent = "Regenerar diagnóstico";
        btn.disabled = false;
      });
      detail.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    document.getElementById("genBtn").addEventListener("click", () => {
      const box = document.getElementById("genBox");
      box.style.display = box.style.display === "none" ? "block" : "none";
    });

    document.getElementById("genRun").addEventListener("click", async (e) => {
      const btn = e.target;
      const topic = document.getElementById("genTopic").value.trim();
      const result = document.getElementById("genResult");
      if (!topic) { result.innerHTML = '<div class="muted">Escribe un tema.</div>'; return; }
      btn.disabled = true; btn.textContent = "Generando…";
      result.innerHTML = '<div class="muted">Creando ejercicios con IA…</div>';
      try {
        const r = await fetch(`${API}/generate-problem`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            topic,
            level: document.getElementById("genLevel").value.trim() || "básico",
            language: document.getElementById("genLang").value,
            count: Number(document.getElementById("genCount").value) || 3,
          }),
        });
        const d = await r.json();
        const probs = Array.isArray(d.problems) ? d.problems : [];
        result.innerHTML = `<h3>Lección: ${d.lesson || topic}</h3>` + probs.map((p) => `
          <div class="gen-problem">
            <div class="skill">${p.skill || ""}</div>
            <div><strong>${p.title || ""}</strong></div>
            <div>${p.body || ""}</div>
            <div class="q">${p.stepTitle || ""}</div>
            ${(p.choices || []).map((c) => `<div class="gen-choice ${c === p.answer ? "correct" : ""}">${c}${c === p.answer ? "  ✓" : ""}</div>`).join("")}
          </div>`).join("") || '<div class="muted">No se generaron ejercicios.</div>';
      } catch (err) {
        result.innerHTML = `<div class="muted">Error: ${err.message}</div>`;
      }
      btn.disabled = false; btn.textContent = "Generar";
    });

    document.getElementById("reportBtn").addEventListener("click", async (e) => {
      const btn = e.target;
      const box = document.getElementById("reportBox");
      btn.disabled = true;
      btn.textContent = "Analizando el grupo…";
      box.style.display = "block";
      box.innerHTML = '<span class="ai-tag">SÓCRATIA · IA</span><div class="muted">Generando reporte…</div>';
      try {
        const r = await fetch(`${API}/class-report`);
        const d = await r.json();
        box.innerHTML = '<span class="ai-tag">SÓCRATIA · IA</span>' + renderMarkdown(d.report || "Sin datos.");
      } catch (err) {
        box.innerHTML = `<div class="muted">Error: ${err.message}</div>`;
      }
      btn.textContent = "Regenerar reporte del grupo";
      btn.disabled = false;
    });

    async function load() {
      const res = await fetch(`${API}/students`);
      const students = await res.json();
      renderCards(students);
      renderRows(students);
    }

    load().catch((error) => {
      document.getElementById("rows").innerHTML =
        `<tr><td colspan="6" class="empty">Error cargando datos: ${error.message}</td></tr>`;
    });
  </script>
</body>
</html>
